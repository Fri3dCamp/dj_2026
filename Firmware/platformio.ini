[env]
platform = ch32v
framework = noneos-sdk
board = genericCH32X035G8U6
;turn off the compilation of the built-in debug implementation
board_build.use_builtin_debug_code = no
upload_protocol = isp

[env:debug]
build_flags = -DDEBUG=3 -DVERSION_MAJOR=\"255\" -DVERSION_MINOR=\"255\" -DVERSION_PATCH=\"255\"

[env:release]
build_flags = -DVERSION_MAJOR=\"1\" -DVERSION_MINOR=\"0\" -DVERSION_PATCH=\"0\"
